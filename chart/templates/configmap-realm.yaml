apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openprime-keycloak.fullname" . }}-realm-config
  labels:
    {{- include "openprime-keycloak.labels" . | nindent 4 }}
data:
  openprime-realm.json: |
    {
      "realm": "openprime",
      "enabled": true,
      "displayName": "OpenPrime",
      "sslRequired": "none",
      "accessTokenLifespan": 3600,
      "refreshTokenMaxReuse": 0,
      "ssoSessionIdleTimeout": 1800,
      "loginTheme": "openprime",
      "accountTheme": "openprime",
      "clients": [
        {
          "clientId": "openprime-app",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "redirectUris": ["https://{{ .Values.openprime.frontendUrl }}/*"],
          "webOrigins": ["https://{{ .Values.openprime.frontendUrl }}"],
          "protocol": "openid-connect"
        },
        {
          "clientId": "argocd",
          "enabled": true,
          "publicClient": false,
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "secret": "{{ .Values.argocd.clientSecret }}",
          "redirectUris": [
            "https://argocd.{{ .Values.openprime.domain }}/dex/callback"
          ],
          "webOrigins": ["https://argocd.{{ .Values.openprime.domain }}"],
          "attributes": {
            "pkce.code.challenge.method": "S256"
          },
          "protocol": "openid-connect",
          "protocolMappers": [
            {
              "name": "groups",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-group-membership-mapper",
              "consentRequired": false,
              "config": {
                "full.path": "false",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "groups",
                "userinfo.token.claim": "true"
              }
            }
          ]
        }
      ],
      "groups": [
        {
          "name": "openprime-admins"
        },
        {
          "name": "openprime-users"
        }
      ],
      "users": [
        {
          "username": "testuser",
          "enabled": true,
          "firstName": "testuser",
          "lastName": "User",
          "email": "testuser@example.com",
          "emailVerified": true,
          "credentials": [
            {
              "type": "password",
              "value": "password123",
              "temporary": false
            }
          ],
          "groups": ["openprime-users"]
        },
        {
          "username": "adminuser",
          "enabled": true,
          "firstName": "adminuser",
          "lastName": "User",
          "email": "adminuser@example.com",
          "emailVerified": true,
          "credentials": [
            {
              "type": "password",
              "value": "admin123",
              "temporary": false
            }
          ],
          "groups": ["openprime-admins"]
        }
      ]
    }