{{- if .Values.theme.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openprime-keycloak.fullname" . }}-theme
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openprime-keycloak.labels" . | nindent 4 }}
    app.kubernetes.io/component: theme
data:
  # Theme configuration
  theme.properties: |
{{ .Files.Get "theme/openprime/login/theme.properties" | indent 4 }}

  # Custom messages
  messages_en.properties: |
{{ .Files.Get "theme/openprime/login/messages/messages_en.properties" | indent 4 }}

  # Custom CSS styling
  theme.css: |
{{ .Files.Get "theme/openprime/login/resources/css/theme.css" | indent 4 }}

  # Custom template
  template.ftl: |
{{ .Files.Get "theme/openprime/login/template.ftl" | indent 4 }}
{{- end }}