{{- if and .Values.app.secrets (not .Values.app.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openprime-keycloak.fullname" . }}-secrets
  labels:
    {{- include "openprime-keycloak.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $key, $value := .Values.app.secrets }}
  {{ $key }}: {{ $value | b64enc }}
  {{- end }}
{{- end }}
