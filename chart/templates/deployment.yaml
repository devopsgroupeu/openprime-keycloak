apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openprime-keycloak.fullname" . }}
  labels:
    {{- include "openprime-keycloak.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "openprime-keycloak.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if .Values.theme.enabled }}
        checksum/theme: {{ include "openprime-keycloak.fullname" . }}-theme-{{ .Release.Revision }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "openprime-keycloak.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openprime-keycloak.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.keycloak.command }}
          command:
            {{- toYaml .Values.keycloak.command | nindent 12 }}
          {{- end }}
          {{- if .Values.keycloak.args }}
          args:
            {{- toYaml .Values.keycloak.args | nindent 12 }}
          {{- else }}
          args:
            - start-dev
          {{- end }}
          env:
            {{- range $key, $value := .Values.app.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.keycloak.extraEnvVars }}
            {{- toYaml .Values.keycloak.extraEnvVars | nindent 12 }}
            {{- end }}
            {{- if .Values.app.secrets }}
            {{- range $key, $value := .Values.app.secrets }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "openprime-keycloak.fullname" $ }}-secrets
                  key: {{ $key }}
            {{- end }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          {{- if .Values.healthCheck.enabled }}
          livenessProbe:
            {{- toYaml .Values.healthCheck.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.healthCheck.readinessProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.keycloak.extraVolumeMounts }}
            {{- toYaml .Values.keycloak.extraVolumeMounts | nindent 12 }}
            {{- end }}
            {{- if .Values.theme.enabled }}
            # OpenPrime theme file mounts - optimized for performance
            - name: theme-config
              mountPath: /opt/keycloak/themes/openprime/login/theme.properties
              subPath: theme.properties
              readOnly: true
            - name: theme-config
              mountPath: /opt/keycloak/themes/openprime/login/messages/messages_en.properties
              subPath: messages_en.properties
              readOnly: true
            - name: theme-config
              mountPath: /opt/keycloak/themes/openprime/login/resources/css/theme.css
              subPath: theme.css
              readOnly: true
            - name: theme-config
              mountPath: /opt/keycloak/themes/openprime/login/template.ftl
              subPath: template.ftl
              readOnly: true
            {{- end }}
      volumes:
        {{- if .Values.keycloak.extraVolumes }}
        {{- toYaml .Values.keycloak.extraVolumes | nindent 8 }}
        {{- end }}
        {{- if .Values.theme.enabled }}
        - name: theme-config
          configMap:
            name: {{ include "openprime-keycloak.fullname" . }}-theme
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}